name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "mvp/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "mvp/frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: mvp/frontend

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mvp/frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build (local base)
        run: npm run build

      - name: Build (GitHub Pages base)
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
